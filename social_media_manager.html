<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Social Media Manager</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    body{background:#07070f;font-family:'Inter',-apple-system,sans-serif;color:#f0f0f5;-webkit-font-smoothing:antialiased}
    input,textarea,select,button{font-family:inherit}
    textarea{line-height:1.6}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#07070f}::-webkit-scrollbar-thumb{background:#1c1c30;border-radius:3px}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    ::placeholder{color:#60607a}
    #api-overlay{position:fixed;inset:0;background:#07070f;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px}
    #api-overlay.hidden{display:none}
    .api-card{background:#10101e;border:1px solid #1c1c30;border-radius:20px;padding:36px 32px;max-width:460px;width:100%}
    .api-card h2{color:#f0f0f5;font-size:22px;font-weight:800;margin-bottom:8px}
    .api-card p{color:#a0a0b8;font-size:14px;line-height:1.7;margin-bottom:20px}
    .api-card input{width:100%;background:#181828;border:1px solid #1c1c30;border-radius:12px;padding:14px 16px;color:#f0f0f5;font-size:15px;outline:none;margin-bottom:14px}
    .api-card input:focus{border-color:#E1306C}
    .api-card button{width:100%;background:linear-gradient(135deg,#E1306C,#833AB4);border:none;border-radius:12px;padding:14px;color:#fff;font-weight:700;font-size:16px;cursor:pointer}
    .api-card .note{color:#60607a;font-size:12px;text-align:center;margin-top:12px;line-height:1.6}
    .api-card .note a{color:#E1306C;text-decoration:none}
  </style>
</head>
<body>
<div id="api-overlay">
  <div class="api-card">
    <div style="display:flex;gap:5px;margin-bottom:20px">
      <div style="width:10px;height:10px;border-radius:50%;background:#E1306C"></div>
      <div style="width:10px;height:10px;border-radius:50%;background:#833AB4"></div>
      <div style="width:10px;height:10px;border-radius:50%;background:#405DE6"></div>
    </div>
    <h2>Social Media Manager</h2>
    <p>Enter your Anthropic API key to power AI features — content research, check-in analysis, and MI Dashboard. Saved locally, never shared.</p>
    <input type="password" id="api-key-input" placeholder="sk-ant-api03-..."/>
    <button onclick="saveApiKey()">Start →</button>
    <p class="note">Get a free key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a><br/>Your key stays on your device only.</p>
  </div>
</div>
<div id="root"></div>
<script>
  let ANTHROPIC_API_KEY=localStorage.getItem("smm_api_key")||"";
  function saveApiKey(){const v=document.getElementById("api-key-input").value.trim();if(!v.startsWith("sk-")){alert("Please enter a valid Anthropic API key");return;}ANTHROPIC_API_KEY=v;localStorage.setItem("smm_api_key",v);document.getElementById("api-overlay").classList.add("hidden");}
  if(ANTHROPIC_API_KEY&&ANTHROPIC_API_KEY.startsWith("sk-"))document.getElementById("api-overlay").classList.add("hidden");
  document.getElementById("api-key-input").addEventListener("keydown",e=>{if(e.key==="Enter")saveApiKey();});
  const _of=window.fetch.bind(window);
  window.fetch=function(url,opts){if(typeof url==="string"&&url.includes("anthropic.com")){opts=opts||{};opts.headers={...(opts.headers||{}),"x-api-key":ANTHROPIC_API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};}return _of(url,opts);};
</script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

// ── TOKENS ────────────────────────────────────────────────────────────────────
const BG="#07070f",SURFACE="#10101e",EDGE="#1c1c30",LIFT="#181828";
const T1="#f0f0f5",T2="#a0a0b8",T3="#60607a",T4="#38384e";
const PINK="#E1306C",PURPLE="#833AB4",BLUE="#405DE6",GREEN="#00C98A",YELLOW="#F5B800",RED="#F04444";

// ── ACCOUNT COLORS / EMOJIS ───────────────────────────────────────────────────
const ACCOUNT_COLORS=["#E1306C","#833AB4","#405DE6","#00C98A","#F5B800","#F04444","#C13584","#5851DB","#FF6B35","#00B4D8"];
const ACCOUNT_EMOJIS=["🌟","🔥","💎","🚀","🎯","👑","⚡","🌈","🎨","💡"];

// ── STORAGE ───────────────────────────────────────────────────────────────────
const SK="smm_v2_accounts";
function loadAll(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch{return null;}}
function saveAll(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch{}}

// ── CONTENT TYPE CONFIG ───────────────────────────────────────────────────────
const CONTENT_TYPES={
  Reel:{icon:"🎬",color:PINK,primaryKPI:"views",kpiTarget:20000,kpiLabel:"Views",kpiNote:"20k–30k target",signalNote:"Watch time + saves + shares",
    schedules:[
      {id:"r_30m",label:"30-Min",icon:"⚡",timing:"30 min after posting",minH:0.4,maxH:4,urgency:"critical",why:"First 30 min = highest-weight window for algorithm decision.",metrics:["views","likes","comments","shares","saves"],focusMetric:"views",focusNote:"Views in first 30 min signal viral potential"},
      {id:"r_2h",label:"2-Hour",icon:"🕑",timing:"2 hrs after posting",minH:1.8,maxH:10,urgency:"high",why:"Catch stalling Reels before algo deprioritises. Watch time locks in here.",metrics:["views","likes","comments","shares","saves","reach"],focusMetric:"saves",focusNote:"Save rate >3% = lasting value signal"},
      {id:"r_24h",label:"24-Hour",icon:"📊",timing:"24 hrs after posting",minH:22,maxH:52,urgency:"medium",why:"Benchmark snapshot. Determines Explore eligibility.",metrics:["views","likes","comments","shares","saves","reach","profile_visits","new_follows"],focusMetric:"reach",focusNote:"Reach > followers = Explore pickup"},
      {id:"r_72h",label:"72-Hour",icon:"🔬",timing:"3 days after posting",minH:68,maxH:104,urgency:"low",why:"Detect delayed virality. Explore spikes days later.",metrics:["views","likes","saves","reach","new_follows"],focusMetric:"views",focusNote:"Still growing = Explore — do not edit"},
    ],studioFields:{hasAudio:true,structureLabel:"Reel Structure (beat by beat)",hookLabel:"Hook (0–3 seconds)",coverLabel:"Thumbnail / Cover Frame"}},
  Post:{icon:"🖼️",color:BLUE,primaryKPI:"saves",kpiTarget:null,kpiLabel:"Saves",kpiNote:"Save rate >3%",signalNote:"Saves + shares primary signal",
    schedules:[
      {id:"p_2h",label:"2-Hour",icon:"🕑",timing:"2 hrs after posting",minH:1.8,maxH:10,urgency:"critical",why:"Posts peak in first 2hrs. Save rate determines extended reach.",metrics:["likes","comments","shares","saves","reach"],focusMetric:"saves",focusNote:"Save rate in 2hrs = #1 Post signal"},
      {id:"p_24h",label:"24-Hour",icon:"📊",timing:"24 hrs after posting",minH:22,maxH:52,urgency:"high",why:"Final read on reach. Check profile visits converting.",metrics:["likes","comments","shares","saves","reach","profile_visits","new_follows"],focusMetric:"reach",focusNote:"Reach beyond followers = Explore"},
      {id:"p_7d",label:"7-Day",icon:"📅",timing:"7 days after posting",minH:160,maxH:200,urgency:"medium",why:"High-save posts get reshared for weeks.",metrics:["likes","comments","saves","reach","new_follows"],focusMetric:"new_follows",focusNote:"Delayed followers = still circulating"},
    ],studioFields:{hasAudio:false,structureLabel:"Post Layout & Visual Hierarchy",hookLabel:"Visual Hook (scroll stopper)",coverLabel:"Image Concept"}},
  Carousel:{icon:"📂",color:PURPLE,primaryKPI:"saves",kpiTarget:null,kpiLabel:"Saves",kpiNote:"Saves + swipe-through",signalNote:"Swipe-through + saves + shares",
    schedules:[
      {id:"c_2h",label:"2-Hour",icon:"🕑",timing:"2 hrs after posting",minH:1.8,maxH:10,urgency:"critical",why:"Swipe-through rate in 2hrs tells algo if slides are engaging.",metrics:["likes","comments","shares","saves","reach"],focusMetric:"saves",focusNote:"High saves = bookmarked = algo push"},
      {id:"c_24h",label:"24-Hour",icon:"📊",timing:"24 hrs after posting",minH:22,maxH:52,urgency:"high",why:"Carousels have longer peak windows. Shares signal authority.",metrics:["likes","comments","shares","saves","reach","profile_visits","new_follows"],focusMetric:"shares",focusNote:"Carousel shares = strongest signal"},
      {id:"c_7d",label:"7-Day",icon:"📅",timing:"7 days after posting",minH:160,maxH:200,urgency:"medium",why:"Carousels have the longest tail of any format.",metrics:["likes","comments","saves","reach","new_follows"],focusMetric:"reach",focusNote:"Still growing at 7d = being reshared"},
    ],studioFields:{hasAudio:false,structureLabel:"Slide Structure (slide by slide)",hookLabel:"Slide 1 Hook (cover stop-scroll)",coverLabel:"Cover Slide Design"}},
};
const ALL_TYPES=["Reel","Post","Carousel"];
const METRIC_META={
  views:{label:"Views",icon:"👁️",ph:"e.g. 8500"},likes:{label:"Likes",icon:"❤️",ph:"e.g. 320"},
  comments:{label:"Comments",icon:"💬",ph:"e.g. 28"},saves:{label:"Saves",icon:"🔖",ph:"e.g. 190"},
  shares:{label:"Shares/Sends",icon:"📤",ph:"e.g. 85"},reach:{label:"Reach (unique)",icon:"📡",ph:"e.g. 3900"},
  profile_visits:{label:"Profile Visits",icon:"👤",ph:"e.g. 220"},new_follows:{label:"New Follows",icon:"➕",ph:"e.g. 12"},
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function Spinner({msg}){return(<div style={{padding:"80px 0",textAlign:"center"}}><div style={{width:44,height:44,border:`3px solid ${EDGE}`,borderTopColor:PINK,borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 20px"}}/><p style={{color:PINK,fontWeight:700,fontSize:15,margin:"0 0 6px"}}>{msg}</p><p style={{color:T3,fontSize:13,margin:0}}>Using fresh research — not templates</p><style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style></div>);}
function TypeBadge({type}){const cfg=CONTENT_TYPES[type]||CONTENT_TYPES.Reel;return <span style={{background:`${cfg.color}28`,color:cfg.color,borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:700}}>{cfg.icon} {type}</span>;}
function Block({icon,label,color,children,style={}}){return(<div style={{background:SURFACE,border:`1px solid ${EDGE}`,borderRadius:14,padding:20,marginBottom:12,...style}}><p style={{color:color||T3,fontWeight:700,fontSize:11,margin:"0 0 12px",textTransform:"uppercase",letterSpacing:1.2}}>{icon} {label}</p>{children}</div>);}
function Lbl({children,color}){return <p style={{color:color||T3,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,margin:"0 0 6px"}}>{children}</p>;}
async function callClaude(sys,user,search=false){
  const body={model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[{role:"user",content:user}]};
  if(search)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  const m=text.match(/\{[\s\S]*\}/);return m?JSON.parse(m[0]):null;
}

// ── ACCOUNT AVATAR ────────────────────────────────────────────────────────────
function Avatar({account,size=36,onClick}){
  const color=account.color||PINK;
  const emoji=account.emoji||"🌟";
  return(
    <div onClick={onClick} style={{width:size,height:size,borderRadius:"50%",background:`${color}30`,border:`2px solid ${color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.45,cursor:onClick?"pointer":"default",flexShrink:0,transition:"all .15s"}}>
      {emoji}
    </div>
  );
}

// ── ACCOUNT SWITCHER DROPDOWN ─────────────────────────────────────────────────
function AccountSwitcher({accounts,activeId,onSwitch,onManage}){
  const [open,setOpen]=useState(false);
  const active=accounts.find(a=>a.id===activeId)||accounts[0];
  const ref=useRef();
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  if(!active)return null;
  return(
    <div ref={ref} style={{position:"relative"}}>
      <div onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"6px 10px",background:open?LIFT:"transparent",borderRadius:10,border:`1px solid ${open?EDGE:"transparent"}`,transition:"all .15s"}}>
        <Avatar account={active} size={28}/>
        <div style={{maxWidth:120}}>
          <div style={{color:T1,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{active.handle}</div>
          <div style={{color:T3,fontSize:10}}>{active.niche}</div>
        </div>
        <span style={{color:T3,fontSize:12,marginLeft:2}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 8px)",left:0,background:SURFACE,border:`1px solid ${EDGE}`,borderRadius:14,padding:8,minWidth:220,zIndex:200,boxShadow:"0 8px 32px rgba(0,0,0,.5)"}}>
          <p style={{color:T3,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,padding:"4px 10px 8px"}}>Accounts ({accounts.length})</p>
          {accounts.map(acc=>(
            <div key={acc.id} onClick={()=>{onSwitch(acc.id);setOpen(false);}} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",borderRadius:10,cursor:"pointer",background:acc.id===activeId?`${acc.color||PINK}18`:"transparent",marginBottom:2,transition:"background .1s"}}>
              <Avatar account={acc} size={30}/>
              <div style={{flex:1,overflow:"hidden"}}>
                <div style={{color:T1,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{acc.handle}</div>
                <div style={{color:T3,fontSize:11}}>{acc.niche} · {acc.followers} followers</div>
              </div>
              {acc.id===activeId&&<span style={{color:acc.color||PINK,fontSize:14}}>✓</span>}
            </div>
          ))}
          <div style={{borderTop:`1px solid ${EDGE}`,marginTop:6,paddingTop:6}}>
            <div onClick={()=>{onManage();setOpen(false);}} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",borderRadius:10,cursor:"pointer",color:T2,fontSize:13}}>
              <span style={{fontSize:16}}>⚙️</span> Manage Accounts
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ACCOUNT MANAGER ───────────────────────────────────────────────────────────
function AccountManager({accounts,activeId,onSave,onClose,onDelete,onSwitch}){
  const [mode,setMode]=useState("list"); // list | add | edit
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({handle:"",niche:"",followers:"",goal:"",audience:"",content_mix:"",competitors:"",color:ACCOUNT_COLORS[0],emoji:ACCOUNT_EMOJIS[0]});

  const openAdd=()=>{setForm({handle:"",niche:"",followers:"",goal:"",audience:"",content_mix:"",competitors:"",color:ACCOUNT_COLORS[accounts.length%ACCOUNT_COLORS.length],emoji:ACCOUNT_EMOJIS[accounts.length%ACCOUNT_EMOJIS.length]});setEditing(null);setMode("add");};
  const openEdit=(acc)=>{setForm({...acc});setEditing(acc.id);setMode("edit");};
  const save=()=>{
    if(!form.handle.trim()||!form.niche.trim())return;
    if(editing){onSave(accounts.map(a=>a.id===editing?{...a,...form}:a));}
    else{onSave([...accounts,{...form,id:Date.now().toString(),contents:[]}]);}
    setMode("list");
  };

  const fields=[
    {id:"handle",label:"Instagram handle *",ph:"@yourusername"},
    {id:"niche",label:"Content niche *",ph:"e.g. Fitness, Finance, Food…"},
    {id:"followers",label:"Current followers",ph:"e.g. 1,200"},
    {id:"goal",label:"Growth goal",ph:"e.g. 10,000 followers in 3 months"},
    {id:"audience",label:"Target audience",ph:"e.g. Women 25-35, home workouts"},
    {id:"content_mix",label:"Content mix",ph:"e.g. 4 Reels + 2 Carousels/week"},
    {id:"competitors",label:"Competitor accounts (optional)",ph:"e.g. @hubermanlab, @garyvee"},
  ];

  if(mode==="list") return(
    <div style={{position:"fixed",inset:0,background:"rgba(7,7,15,.95)",zIndex:150,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:20,overflowY:"auto"}}>
      <div style={{width:"100%",maxWidth:540,paddingBottom:40}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,paddingTop:16}}>
          <h2 style={{color:T1,fontSize:20,fontWeight:800}}>Manage Accounts</h2>
          <button onClick={onClose} style={{background:LIFT,border:`1px solid ${EDGE}`,borderRadius:10,padding:"8px 16px",color:T2,cursor:"pointer",fontSize:13}}>✕ Close</button>
        </div>
        <button onClick={openAdd} style={{width:"100%",background:`linear-gradient(135deg,${PINK},${PURPLE})`,border:"none",borderRadius:12,padding:14,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:16}}>
          + Add New Account
        </button>
        {accounts.map((acc,i)=>(
          <div key={acc.id} style={{background:SURFACE,border:`1px solid ${acc.id===activeId?acc.color||PINK:EDGE}`,borderRadius:14,padding:18,marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
              <Avatar account={acc} size={44}/>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                  <span style={{color:T1,fontWeight:800,fontSize:16}}>{acc.handle}</span>
                  {acc.id===activeId&&<span style={{background:`${acc.color||PINK}25`,color:acc.color||PINK,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>ACTIVE</span>}
                </div>
                <div style={{color:T2,fontSize:13}}>{acc.niche} · {acc.followers} followers</div>
                <div style={{color:T3,fontSize:12,marginTop:2}}>{acc.goal}</div>
              </div>
            </div>
            {/* Stats */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
              {ALL_TYPES.map(t=>{
                const cnt=(acc.contents||[]).filter(c=>c.contentType===t).length;
                const tc=CONTENT_TYPES[t];
                return(<div key={t} style={{background:LIFT,borderRadius:8,padding:"8px 10px",textAlign:"center"}}><div style={{fontSize:16}}>{tc.icon}</div><div style={{color:cnt?tc.color:T4,fontWeight:700,fontSize:15}}>{cnt}</div><div style={{color:T3,fontSize:10,marginTop:2}}>{t}s</div></div>);
              })}
            </div>
            <div style={{display:"flex",gap:8}}>
              {acc.id!==activeId&&<button onClick={()=>{onSwitch(acc.id);onClose();}} style={{flex:1,background:`${acc.color||PINK}20`,border:`1px solid ${acc.color||PINK}50`,borderRadius:10,padding:"9px",color:acc.color||PINK,cursor:"pointer",fontWeight:700,fontSize:13}}>Switch to this account</button>}
              <button onClick={()=>openEdit(acc)} style={{flex:1,background:LIFT,border:`1px solid ${EDGE}`,borderRadius:10,padding:"9px",color:T2,cursor:"pointer",fontSize:13}}>✏️ Edit</button>
              {accounts.length>1&&<button onClick={()=>{if(window.confirm(`Delete ${acc.handle}? This cannot be undone.`))onDelete(acc.id);}} style={{background:"rgba(240,68,68,.15)",border:"1px solid rgba(240,68,68,.3)",borderRadius:10,padding:"9px 14px",color:RED,cursor:"pointer",fontSize:13}}>🗑️</button>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(7,7,15,.95)",zIndex:150,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:20,overflowY:"auto"}}>
      <div style={{width:"100%",maxWidth:540,paddingBottom:40}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,paddingTop:16}}>
          <h2 style={{color:T1,fontSize:20,fontWeight:800}}>{mode==="add"?"Add Account":"Edit Account"}</h2>
          <button onClick={()=>setMode("list")} style={{background:LIFT,border:`1px solid ${EDGE}`,borderRadius:10,padding:"8px 16px",color:T2,cursor:"pointer",fontSize:13}}>← Back</button>
        </div>

        {/* Color + Emoji picker */}
        <div style={{background:SURFACE,border:`1px solid ${EDGE}`,borderRadius:14,padding:18,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
            <Avatar account={form} size={52}/>
            <div>
              <p style={{color:T2,fontSize:13,fontWeight:600,margin:"0 0 6px"}}>Account Color</p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {ACCOUNT_COLORS.map(c=><div key={c} onClick={()=>setForm({...form,color:c})} style={{width:24,height:24,borderRadius:"50%",background:c,cursor:"pointer",border:`2px solid ${form.color===c?"#fff":"transparent"}`,transition:"all .1s"}}/>)}
              </div>
            </div>
          </div>
          <p style={{color:T2,fontSize:13,fontWeight:600,margin:"0 0 8px"}}>Emoji</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {ACCOUNT_EMOJIS.map(e=><button key={e} onClick={()=>setForm({...form,emoji:e})} style={{background:form.emoji===e?`${form.color||PINK}30`:LIFT,border:`1px solid ${form.emoji===e?form.color||PINK:EDGE}`,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:18}}>{e}</button>)}
          </div>
        </div>

        {fields.map(f=>(
          <div key={f.id} style={{marginBottom:14}}>
            <label style={{color:T2,fontSize:13,fontWeight:600,display:"block",marginBottom:7}}>{f.label}</label>
            <input value={form[f.id]||""} onChange={e=>setForm({...form,[f.id]:e.target.value})} placeholder={f.ph}
              style={{width:"100%",background:LIFT,border:`1px solid ${EDGE}`,borderRadius:10,padding:"13px 14px",color:T1,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          </div>
        ))}

}

// ── CROSS-ACCOUNT OVERVIEW ────────────────────────────────────────────────────
function CrossAccountOverview({accounts,onSwitch}){
  const getAvgViews=(acc)=>{
    const reels=(acc.contents||[]).filter(c=>c.contentType==="Reel");
    const vals=reels.map(c=>{const v=(c.logs||[]).map(l=>parseInt(l.metrics?.views||0)).filter(Boolean);return v.length?Math.max(...v):0;}).filter(Boolean);
    return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null;
  };
  const getFollows=(acc)=>(acc.contents||[]).flatMap(c=>c.logs||[]).reduce((s,l)=>s+parseInt(l.metrics?.new_follows||0),0);
  const getDue=(acc)=>{
    let d=0;const now=Date.now();
    (acc.contents||[]).forEach(c=>{const hrs=(now-new Date(c.postedAt).getTime())/3600000;const cfg=CONTENT_TYPES[c.contentType]||CONTENT_TYPES.Reel;cfg.schedules.forEach(s=>{if(hrs>=s.minH&&hrs<=s.maxH&&!(c.logs||[]).some(l=>l.checkInId===s.id))d++;});});
    return d;
  };
  const totalDue=accounts.reduce((s,a)=>s+getDue(a),0);

  return(
    <div style={{padding:"20px 0"}}>
      <h2 style={{color:T1,margin:"0 0 6px",fontSize:20,fontWeight:800}}>All Accounts Overview</h2>
      <p style={{color:T2,fontSize:14,margin:"0 0 20px"}}>Performance snapshot across all {accounts.length} accounts</p>

      {totalDue>0&&(
        <div style={{background:`${PINK}10`,border:`1px solid ${PINK}50`,borderRadius:14,padding:16,marginBottom:20,display:"flex",gap:12,alignItems:"center"}}>
          <span style={{fontSize:24}}>⚡</span>
          <div><div style={{color:PINK,fontWeight:700,fontSize:15}}>{totalDue} check-in{totalDue>1?"s":""} due across accounts</div>
          <div style={{color:T2,fontSize:13}}>Switch to each account to complete them</div></div>
        </div>
      )}

      {/* Summary stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
        {[
          {label:"Total Accounts",val:accounts.length,col:"#C4A7FF"},
          {label:"Total Content",val:accounts.reduce((s,a)=>(s+(a.contents||[]).length),0),col:BLUE},
          {label:"Total Follows",val:accounts.reduce((s,a)=>s+getFollows(a),0)||"—",col:GREEN},
        ].map((s,i)=>(
          <div key={i} style={{background:SURFACE,border:`1px solid ${EDGE}`,borderRadius:14,padding:16,textAlign:"center"}}>
            <div style={{color:s.col,fontWeight:800,fontSize:22,lineHeight:1}}>{s.val}</div>
            <div style={{color:T3,fontSize:11,margin:"5px 0 3px",textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Per-account cards */}
      {accounts.map(acc=>{
        const avgV=getAvgViews(acc);const follows=getFollows(acc);const due=getDue(acc);
        const color=acc.color||PINK;
        return(
          <div key={acc.id} onClick={()=>onSwitch(acc.id)} style={{background:SURFACE,border:`1px solid ${EDGE}`,borderRadius:14,padding:18,marginBottom:12,cursor:"pointer",transition:"border-color .15s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=color}
            onMouseLeave={e=>e.currentTarget.style.borderColor=EDGE}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
              <Avatar account={acc} size={42}/>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                  <span style={{color:T1,fontWeight:800,fontSize:15}}>{acc.handle}</span>
                  {due>0&&<span style={{background:`${YELLOW}25`,color:YELLOW,borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:700}}>{due} due</span>}
                </div>
                <div style={{color:T2,fontSize:13}}>{acc.niche} · {acc.followers} followers</div>
              </div>
              <span style={{color:T3,fontSize:20}}>›</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
              {[
                {label:"Avg Views",val:avgV?avgV.toLocaleString():"—",col:avgV>=20000?GREEN:avgV>0?YELLOW:T3},
                {label:"Content",val:(acc.contents||[]).length,col:color},
                {label:"Follows",val:follows||"—",col:follows?GREEN:T3},
                {label:"Check-ins",val:due>0?`${due} due`:"✓ done",col:due>0?YELLOW:T3},
              ].map((s,i)=>(
                <div key={i} style={{background:LIFT,borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                  <div style={{color:s.col,fontWeight:800,fontSize:15,lineHeight:1}}>{s.val}</div>
                  <div style={{color:T3,fontSize:10,marginTop:4}}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── CHECK-INS TAB ─────────────────────────────────────────────────────────────
function CheckinsTab({account,updateAccount,profile}){
  const [active,setActive]=useState(null);const now=Date.now();
  const contents=account.contents||[];
  const getDue=()=>{const due=[];contents.forEach(c=>{const hrs=(now-new Date(c.postedAt).getTime())/3600000;const cfg=CONTENT_TYPES[c.contentType]||CONTENT_TYPES.Reel;cfg.schedules.forEach(s=>{const done=(c.logs||[]).some(l=>l.checkInId===s.id);if(hrs>=s.minH&&hrs<=s.maxH&&!done)due.push({content:c,schedule:s});});});return due;};
  const handleComplete=(contentId,checkInId,metrics,analysis)=>{
    updateAccount({...account,contents:contents.map(c=>c.id!==contentId?c:{...c,logs:[...(c.logs||[]),{checkInId,metrics,analysis,actions:[...(analysis.do_now||[]).map(d=>d.action),...(analysis.do_today||[])],loggedAt:new Date().toISOString()}]})});
    setActive(null);
  };
  const due=getDue();
  if(active)return <CheckinFlow content={active.content} schedule={active.schedule} profile={profile} onComplete={(cid,m,a)=>handleComplete(active.content.id,cid,m,a)} onBack={()=>setActive(null)}/>;
  return(<div style={{padding:"20px 0"}}>
    <h2 style={{color:T1,margin:"0 0 4px",fontSize:20,fontWeight:800}}>Check-ins</h2>
    <p style={{color:T2,fontSize:14,margin:"0 0 6px"}}>{account.handle}</p>
    <p style={{color:T2,fontSize:14,margin:"0 0 24px"}}>{due.length>0?`${due.length} due now`:"All caught up"}</p>
    {due.map((item,i)=>{const tc=CONTENT_TYPES[item.content.contentType]||CONTENT_TYPES.Reel;const uc=item.schedule.urgency==="critical"?tc.color:item.schedule.urgency==="high"?YELLOW:T4;return(<div key={i} onClick={()=>setActive(item)} style={{background:SURFACE,border:`1px solid ${item.schedule.urgency==="critical"?`${tc.color}60`:item.schedule.urgency==="high"?`${YELLOW}40`:EDGE}`,borderRadius:14,padding:18,marginBottom:12,cursor:"pointer",display:"flex",gap:14}}><span style={{fontSize:26,alignSelf:"center"}}>{item.schedule.icon}</span><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{color:T1,fontWeight:700,fontSize:15}}>{item.schedule.label}</span><TypeBadge type={item.content.contentType}/></div><span style={{background:`${uc}25`,color:uc,borderRadius:20,padding:"3px 11px",fontSize:11,fontWeight:700}}>{item.schedule.urgency==="critical"?"NOW":item.schedule.urgency==="high"?"SOON":"DUE"}</span></div><p style={{color:tc.color,margin:"0 0 3px",fontSize:14,fontWeight:600}}>"{item.content.title}"</p><p style={{color:T3,margin:0,fontSize:13}}>{item.schedule.timing} · Focus: {item.schedule.focusMetric}</p></div><span style={{color:T3,fontSize:20,alignSelf:"center"}}>›</span></div>);})}
    {due.length===0&&contents.length>0&&<div style={{textAlign:"center",padding:"50px 0"}}><div style={{fontSize:44,marginBottom:14}}>✅</div><p style={{color:T2,fontSize:15}}>All check-ins complete</p></div>}
    {contents.length===0&&<div style={{textAlign:"center",padding:"60px 0"}}><div style={{fontSize:44,marginBottom:14}}>📊</div><p style={{color:T2,fontSize:15}}>No content tracked yet</p><p style={{color:T3,fontSize:13,marginTop:8}}>Log content in Tracker after publishing</p></div>}
  </div>);
}

      clearInterval(iv);if(r)setMiData(r);
