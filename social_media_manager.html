<body>
<div id="api-overlay">
  <div class="api-card">
    <div style="display:flex;gap:5px;margin-bottom:20px">
      <div style="width:10px;height:10px;border-radius:50%;background:#E1306C"></div>
      <div style="width:10px;height:10px;border-radius:50%;background:#833AB4"></div>
      <div style="width:10px;height:10px;border-radius:50%;background:#405DE6"></div>
    </div>
    <h2>Social Media Manager</h2>
    <p>Enter your Anthropic API key to power AI features. Saved locally, never shared.</p>
    <input type="password" id="api-key-input" placeholder="sk-ant-api03-..."/>
    <button onclick="saveApiKey()">Start &#x2192;</button>
    <p class="note">Get a free key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a><br/>Your key stays on your device only.</p>
  </div>
</div>
<div id="root"></div>
<script>
  let ANTHROPIC_API_KEY=localStorage.getItem("smm_api_key")||"";
  function saveApiKey(){
    const v=document.getElementById("api-key-input").value.trim();
    if(!v.startsWith("sk-")){alert("Please enter a valid Anthropic API key (starts with sk-)");return;}
    ANTHROPIC_API_KEY=v;localStorage.setItem("smm_api_key",v);
    document.getElementById("api-overlay").classList.add("hidden");
  }
  if(ANTHROPIC_API_KEY&&ANTHROPIC_API_KEY.startsWith("sk-"))document.getElementById("api-overlay").classList.add("hidden");
  document.getElementById("api-key-input").addEventListener("keydown",e=>{if(e.key==="Enter")saveApiKey();});
  const _of=window.fetch.bind(window);
  window.fetch=function(url,opts){
    if(typeof url==="string"&&url.includes("anthropic.com")){
      opts=opts||{};
      opts.headers={...(opts.headers||{}),"x-api-key":ANTHROPIC_API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    }
    return _of(url,opts);
  };
</script>

function safeParseJSON(text){
  // Extract the JSON object from the response
  const m=text.match(/\{[\s\S]*\}/);
  if(!m) return null;
  let s=m[0];
  try{return JSON.parse(s);}catch(e1){
    // Fix 1: remove trailing commas before } or ]
    s=s.replace(/,(\s*[}\]])/g,"$1");
    try{return JSON.parse(s);}catch(e2){
      // Fix 2: replace smart/curly quotes with straight quotes
      s=s.replace(/[\u2018\u2019]/g,"'").replace(/[\u201C\u201D]/g,'"');
      try{return JSON.parse(s);}catch(e3){
        // Fix 3: remove newlines inside string values
        s=s.replace(/"([^"]*)"/g,function(_,p){return '"'+p.replace(/\n/g,' ').replace(/\r/g,'')+'"';});
        try{return JSON.parse(s);}catch(e4){
          // Fix 4: truncate to last complete top-level field and close the object
          const lastComma=s.lastIndexOf(',"');
          if(lastComma>0){
            s=s.substring(0,lastComma)+"}";
            try{return JSON.parse(s);}catch(e5){}
          }
          // Fix 5: use Function eval as last resort (safe — only our own API data)
          try{return Function('"use strict";return ('+s+')')();}catch(e6){
            console.error("JSON parse failed after all fixes:",e6.message);
            return null;
          }
        }
      }
    }
  }
}

async function callClaude(sys,user,search){
  const body={model:"claude-sonnet-4-6",max_tokens:4000,system:sys,messages:[{role:"user",content:user}]};
  if(search) body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const data=await res.json();
  if(data.error) throw new Error(data.error.message);
  const text=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");
  const parsed=safeParseJSON(text);
  if(!parsed) throw new Error("Could not parse AI response. Please try again.");
  return parsed;
}

function Avatar({account,size,onClick}){
  size=size||36;
  const color=account.color||PINK;
  const emoji=account.emoji||"🌟";
  return(
    <div onClick={onClick} style={{width:size,height:size,borderRadius:"50%",background:color+"30",border:"2px solid "+color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.45,cursor:onClick?"pointer":"default",flexShrink:0}}>
      {emoji}
    </div>
  );
}

function AccountSwitcher({accounts,activeId,onSwitch,onManage}){
  const [open,setOpen]=useState(false);
  const active=accounts.find(function(a){return a.id===activeId;})||accounts[0];
  const ref=useRef();
  useEffect(function(){
    function h(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener("mousedown",h);
    return function(){document.removeEventListener("mousedown",h);};
  },[]);
  if(!active) return null;
  return(
    <div ref={ref} style={{position:"relative"}}>
      <div onClick={function(){setOpen(!open);}} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"6px 10px",background:open?LIFT:"transparent",borderRadius:10,border:"1px solid "+(open?EDGE:"transparent")}}>
        <Avatar account={active} size={28}/>
        <div style={{maxWidth:120}}>
          <div style={{color:T1,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{active.handle}</div>
          <div style={{color:T3,fontSize:10}}>{active.niche}</div>
        </div>
        <span style={{color:T3,fontSize:12}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 8px)",left:0,background:SURFACE,border:"1px solid "+EDGE,borderRadius:14,padding:8,minWidth:220,zIndex:200,boxShadow:"0 8px 32px rgba(0,0,0,.5)"}}>
          <p style={{color:T3,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,padding:"4px 10px 8px"}}>Accounts ({accounts.length})</p>
          {accounts.map(function(acc){
            return(
              <div key={acc.id} onClick={function(){onSwitch(acc.id);setOpen(false);}} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",borderRadius:10,cursor:"pointer",background:acc.id===activeId?(acc.color||PINK)+"18":"transparent",marginBottom:2}}>
                <Avatar account={acc} size={30}/>
                <div style={{flex:1,overflow:"hidden"}}>
                  <div style={{color:T1,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{acc.handle}</div>
                  <div style={{color:T3,fontSize:11}}>{acc.niche}</div>
                </div>
                {acc.id===activeId&&<span style={{color:acc.color||PINK,fontSize:14}}>✓</span>}
              </div>
            );
          })}
          <div style={{borderTop:"1px solid "+EDGE,marginTop:6,paddingTop:6}}>
            <div onClick={function(){onManage();setOpen(false);}} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",borderRadius:10,cursor:"pointer",color:T2,fontSize:13}}>
              <span style={{fontSize:16}}>⚙️</span> Manage Accounts
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function AccountManager({accounts,activeId,onSave,onClose,onDelete,onSwitch}){
  const [mode,setMode]=useState("list");
  const [editing,setEditing]=useState(null);
  const blankForm={handle:"",niche:"",followers:"",goal:"",audience:"",content_mix:"",competitors:"",color:ACCOUNT_COLORS[0],emoji:ACCOUNT_EMOJIS[0]};
  const [form,setForm]=useState(blankForm);

  const openAdd=function(){
    setForm({...blankForm,color:ACCOUNT_COLORS[accounts.length%ACCOUNT_COLORS.length],emoji:ACCOUNT_EMOJIS[accounts.length%ACCOUNT_EMOJIS.length]});
    setEditing(null);setMode("add");
  };
  const openEdit=function(acc){setForm({...acc});setEditing(acc.id);setMode("edit");};
  const save=function(){
    if(!form.handle.trim()||!form.niche.trim()) return;
    if(editing){onSave(accounts.map(function(a){return a.id===editing?{...a,...form}:a;}));}
    else{onSave([...accounts,{...form,id:Date.now().toString(),contents:[]}]);}
    setMode("list");
  };

  const fields=[
    {id:"handle",label:"Instagram handle *",ph:"@yourusername"},
    {id:"niche",label:"Content niche *",ph:"e.g. Fitness, Finance, Food"},
    {id:"followers",label:"Current followers",ph:"e.g. 1,200"},
    {id:"goal",label:"Growth goal",ph:"e.g. 10,000 followers in 3 months"},
    {id:"audience",label:"Target audience",ph:"e.g. Women 25-35, home workouts"},
    {id:"content_mix",label:"Content mix",ph:"e.g. 4 Reels + 2 Carousels/week"},
    {id:"competitors",label:"Competitor accounts (optional)",ph:"e.g. @hubermanlab"},
  ];

  if(mode==="list") return(
    <div style={{position:"fixed",inset:0,background:"rgba(7,7,15,.95)",zIndex:150,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:20,overflowY:"auto"}}>
      <div style={{width:"100%",maxWidth:540,paddingBottom:40}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,paddingTop:16}}>
          <h2 style={{color:T1,fontSize:20,fontWeight:800}}>Manage Accounts</h2>
          <button onClick={onClose} style={{background:LIFT,border:"1px solid "+EDGE,borderRadius:10,padding:"8px 16px",color:T2,cursor:"pointer",fontSize:13}}>Close</button>
        </div>
        <button onClick={openAdd} style={{width:"100%",background:"linear-gradient(135deg,"+PINK+","+PURPLE+")",border:"none",borderRadius:12,padding:14,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:16}}>
          + Add New Account
        </button>
        {accounts.map(function(acc){
          return(
            <div key={acc.id} style={{background:SURFACE,border:"1px solid "+(acc.id===activeId?acc.color||PINK:EDGE),borderRadius:14,padding:18,marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <Avatar account={acc} size={44}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                    <span style={{color:T1,fontWeight:800,fontSize:16}}>{acc.handle}</span>
                    {acc.id===activeId&&<span style={{background:(acc.color||PINK)+"25",color:acc.color||PINK,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>ACTIVE</span>}
                  </div>
                  <div style={{color:T2,fontSize:13}}>{acc.niche} - {acc.followers} followers</div>
                  <div style={{color:T3,fontSize:12,marginTop:2}}>{acc.goal}</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
                {ALL_TYPES.map(function(t){
                  const cnt=(acc.contents||[]).filter(function(c){return c.contentType===t;}).length;
                  const tc=CONTENT_TYPES[t];
                  return(
                    <div key={t} style={{background:LIFT,borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
                      <div style={{fontSize:16}}>{tc.icon}</div>
                      <div style={{color:cnt?tc.color:T4,fontWeight:700,fontSize:15}}>{cnt}</div>
                      <div style={{color:T3,fontSize:10,marginTop:2}}>{t}s</div>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:8}}>
                {acc.id!==activeId&&<button onClick={function(){onSwitch(acc.id);onClose();}} style={{flex:1,background:(acc.color||PINK)+"20",border:"1px solid "+(acc.color||PINK)+"50",borderRadius:10,padding:"9px",color:acc.color||PINK,cursor:"pointer",fontWeight:700,fontSize:13}}>Switch to this</button>}
                <button onClick={function(){openEdit(acc);}} style={{flex:1,background:LIFT,border:"1px solid "+EDGE,borderRadius:10,padding:"9px",color:T2,cursor:"pointer",fontSize:13}}>✏️ Edit</button>
                {accounts.length>1&&<button onClick={function(){if(window.confirm("Delete "+acc.handle+"? Cannot be undone."))onDelete(acc.id);}} style={{background:"rgba(240,68,68,.15)",border:"1px solid rgba(240,68,68,.3)",borderRadius:10,padding:"9px 14px",color:RED,cursor:"pointer",fontSize:13}}>🗑️</button>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(7,7,15,.95)",zIndex:150,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:20,overflowY:"auto"}}>
      <div style={{width:"100%",maxWidth:540,paddingBottom:40}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,paddingTop:16}}>
          <h2 style={{color:T1,fontSize:20,fontWeight:800}}>{mode==="add"?"Add Account":"Edit Account"}</h2>
          <button onClick={function(){setMode("list");}} style={{background:LIFT,border:"1px solid "+EDGE,borderRadius:10,padding:"8px 16px",color:T2,cursor:"pointer",fontSize:13}}>Back</button>
        </div>
        <div style={{background:SURFACE,border:"1px solid "+EDGE,borderRadius:14,padding:18,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
            <Avatar account={form} size={52}/>
            <div>
              <p style={{color:T2,fontSize:13,fontWeight:600,margin:"0 0 6px"}}>Color</p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {ACCOUNT_COLORS.map(function(c){
                  return <div key={c} onClick={function(){setForm({...form,color:c});}} style={{width:24,height:24,borderRadius:"50%",background:c,cursor:"pointer",border:"2px solid "+(form.color===c?"#fff":"transparent")}}/>;
                })}
              </div>
            </div>
          </div>
          <p style={{color:T2,fontSize:13,fontWeight:600,margin:"0 0 8px"}}>Emoji</p>

function CrossAccountOverview({accounts,onSwitch}){
  function getAvgViews(acc){
    const reels=(acc.contents||[]).filter(function(c){return c.contentType==="Reel";});
    const vals=reels.map(function(c){const v=(c.logs||[]).map(function(l){return parseInt(l.metrics&&l.metrics.views||0);}).filter(Boolean);return v.length?Math.max.apply(null,v):0;}).filter(Boolean);
    return vals.length?Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length):null;
  }
  function getFollows(acc){return(acc.contents||[]).flatMap(function(c){return c.logs||[];}).reduce(function(s,l){return s+parseInt((l.metrics&&l.metrics.new_follows)||0);},0);}
  function getDue(acc){
    var d=0;var now=Date.now();
    (acc.contents||[]).forEach(function(c){
      var hrs=(now-new Date(c.postedAt).getTime())/3600000;
      var cfg=CONTENT_TYPES[c.contentType]||CONTENT_TYPES.Reel;
      cfg.schedules.forEach(function(s){if(hrs>=s.minH&&hrs<=s.maxH&&!(c.logs||[]).some(function(l){return l.checkInId===s.id;}))d++;});
    });
    return d;
  }
  var totalDue=accounts.reduce(function(s,a){return s+getDue(a);},0);
  return(
    <div style={{padding:"20px 0"}}>
      <h2 style={{color:T1,margin:"0 0 6px",fontSize:20,fontWeight:800}}>All Accounts Overview</h2>
      <p style={{color:T2,fontSize:14,margin:"0 0 20px"}}>{accounts.length} accounts tracked</p>
      {totalDue>0&&(
        <div style={{background:PINK+"10",border:"1px solid "+PINK+"50",borderRadius:14,padding:16,marginBottom:20,display:"flex",gap:12,alignItems:"center"}}>
          <span style={{fontSize:24}}>⚡</span>
          <div>
            <div style={{color:PINK,fontWeight:700,fontSize:15}}>{totalDue} check-in{totalDue>1?"s":""} due across accounts</div>
            <div style={{color:T2,fontSize:13}}>Switch to each account to complete them</div>
          </div>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
        {[
          {label:"Total Accounts",val:accounts.length,col:"#C4A7FF"},
          {label:"Total Content",val:accounts.reduce(function(s,a){return s+(a.contents||[]).length;},0),col:BLUE},
          {label:"Total Follows",val:accounts.reduce(function(s,a){return s+getFollows(a);},0)||"—",col:GREEN},
        ].map(function(s,i){
          return(
            <div key={i} style={{background:SURFACE,border:"1px solid "+EDGE,borderRadius:14,padding:16,textAlign:"center"}}>
              <div style={{color:s.col,fontWeight:800,fontSize:22,lineHeight:1}}>{s.val}</div>
              <div style={{color:T3,fontSize:11,margin:"5px 0 3px",textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}}>{s.label}</div>
            </div>
          );
        })}
      </div>
      {accounts.map(function(acc){
        var avgV=getAvgViews(acc);var follows=getFollows(acc);var due=getDue(acc);
        var color=acc.color||PINK;
        return(
          <div key={acc.id} onClick={function(){onSwitch(acc.id);}} style={{background:SURFACE,border:"1px solid "+EDGE,borderRadius:14,padding:18,marginBottom:12,cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
              <Avatar account={acc} size={42}/>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                  <span style={{color:T1,fontWeight:800,fontSize:15}}>{acc.handle}</span>
                  {due>0&&<span style={{background:YELLOW+"25",color:YELLOW,borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:700}}>{due} due</span>}
                </div>
                <div style={{color:T2,fontSize:13}}>{acc.niche} - {acc.followers} followers</div>
              </div>
              <span style={{color:T3,fontSize:20}}>›</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
              {[
                {label:"Avg Views",val:avgV?avgV.toLocaleString():"—",col:avgV>=20000?GREEN:avgV>0?YELLOW:T3},
                {label:"Content",val:(acc.contents||[]).length,col:color},
                {label:"Follows",val:follows||"—",col:follows?GREEN:T3},
                {label:"Due",val:due>0?(due+" due"):"Done",col:due>0?YELLOW:T3},

  );
}

function CheckinsTab({account,updateAccount,profile}){
  const [active,setActive]=useState(null);
  var now=Date.now();
  var contents=account.contents||[];

  function getDue(){
    var due=[];
    contents.forEach(function(c){
      var hrs=(now-new Date(c.postedAt).getTime())/3600000;
      var cfg=CONTENT_TYPES[c.contentType]||CONTENT_TYPES.Reel;
      cfg.schedules.forEach(function(s){
        var done=(c.logs||[]).some(function(l){return l.checkInId===s.id;});
        if(hrs>=s.minH&&hrs<=s.maxH&&!done) due.push({content:c,schedule:s});
      });
    });
    return due;
  }

  function handleComplete(contentId,checkInId,metrics,analysis){
    var newContents=contents.map(function(c){
      if(c.id!==contentId) return c;
      return {...c,logs:[...(c.logs||[]),{checkInId:checkInId,metrics:metrics,analysis:analysis,actions:[...(analysis.do_now||[]).map(function(d){return d.action;}),...(analysis.do_today||[])],loggedAt:new Date().toISOString()}]};
    });
    updateAccount({...account,contents:newContents});
    setActive(null);
  }

  var due=getDue();

  if(active) return <CheckinFlow content={active.content} schedule={active.schedule} profile={profile} onComplete={function(cid,m,a){handleComplete(active.content.id,cid,m,a);}} onBack={function(){setActive(null);}}/>;

  return(
    <div style={{padding:"20px 0"}}>
      <h2 style={{color:T1,margin:"0 0 4px",fontSize:20,fontWeight:800}}>Check-ins</h2>
      <p style={{color:T2,fontSize:14,margin:"0 0 6px"}}>{account.handle}</p>
      <p style={{color:T2,fontSize:14,margin:"0 0 24px"}}>{due.length>0?(due.length+" due now"):"All caught up"}</p>
      {due.map(function(item,i){
        var tc=CONTENT_TYPES[item.content.contentType]||CONTENT_TYPES.Reel;
        var uc=item.schedule.urgency==="critical"?tc.color:item.schedule.urgency==="high"?YELLOW:T4;
        return(
          <div key={i} onClick={function(){setActive(item);}} style={{background:SURFACE,border:"1px solid "+(item.schedule.urgency==="critical"?tc.color+"60":item.schedule.urgency==="high"?YELLOW+"40":EDGE),borderRadius:14,padding:18,marginBottom:12,cursor:"pointer",display:"flex",gap:14}}>
            <span style={{fontSize:26,alignSelf:"center"}}>{item.schedule.icon}</span>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{color:T1,fontWeight:700,fontSize:15}}>{item.schedule.label}</span><TypeBadge type={item.content.contentType}/></div>
                <span style={{background:uc+"25",color:uc,borderRadius:20,padding:"3px 11px",fontSize:11,fontWeight:700}}>{item.schedule.urgency==="critical"?"NOW":item.schedule.urgency==="high"?"SOON":"DUE"}</span>
              </div>
              <p style={{color:tc.color,margin:"0 0 3px",fontSize:14,fontWeight:600}}>"{item.content.title}"</p>
              <p style={{color:T3,margin:0,fontSize:13}}>{item.schedule.timing} - Focus: {item.schedule.focusMetric}</p>
            </div>
            <span style={{color:T3,fontSize:20,alignSelf:"center"}}>›</span>
          </div>
        );
      })}
      {due.length===0&&contents.length>0&&<div style={{textAlign:"center",padding:"50px 0"}}><div style={{fontSize:44,marginBottom:14}}>✅</div><p style={{color:T2,fontSize:15}}>All check-ins complete</p></div>}
      {contents.length===0&&<div style={{textAlign:"center",padding:"60px 0"}}><div style={{fontSize:44,marginBottom:14}}>📊</div><p style={{color:T2,fontSize:15}}>No content tracked yet</p><p style={{color:T3,fontSize:13,marginTop:8}}>Log content in Tracker after publishing</p></div>}
    </div>
  );
}

    var logs=c.logs||[];

            <div>
              <label style={{color:T2,fontSize:13,fontWeight:600,display:"block",marginBottom:7}}>Topic / title *</label>
              <input value={form.title} onChange={function(e){setForm({...form,title:e.target.value});}} placeholder="e.g. 5 habits that changed my morning"
                style={{width:"100%",background:LIFT,border:"1px solid "+EDGE,borderRadius:10,padding:"13px 14px",color:T1,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
            </div>
            <div>
              <label style={{color:T2,fontSize:13,fontWeight:600,display:"block",marginBottom:8}}>Content type</label>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                {ALL_TYPES.map(function(t){
                  var c=CONTENT_TYPES[t];var sel=form.contentType===t;

                    <button key={t} onClick={function(){setForm({...form,contentType:t});}} style={{background:sel?c.color+"20":LIFT,border:"1px solid "+(sel?c.color:EDGE),borderRadius:10,padding:"12px 6px",cursor:"pointer",textAlign:"center"}}>
                      <div style={{fontSize:20}}>{c.icon}</div>

              <label style={{color:T2,fontSize:13,fontWeight:600,display:"block",marginBottom:7}}>Posted at</label>

        {contents.slice().reverse().map(function(c){

              </div>
              <div style={{display:"flex",gap:7,alignItems:"center"}}>
                {cfg.schedules.map(function(s,i){
                  var done=logs.some(function(l){return l.checkInId===s.id;});
                  return <div key={i} title={s.label} style={{width:28,height:28,borderRadius:"50%",background:done?cfg.color:LIFT,border:"1.5px solid "+(done?cfg.color:EDGE),display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:done?"#fff":T3,fontWeight:700}}>{done?"✓":s.icon}</div>;

            </div>
          );

function MIDashboard({account,profile}){
  const [miData,setMiData]=useState(null);

  const [msg,setMsg]=useState("");
  var contents=account.contents||[];

  var totalFollows=allLogs.reduce(function(s,l){return s+parseInt((l.metrics&&l.metrics.new_follows)||0);},0);
  var typeStats=ALL_TYPES.map(function(t){
    var items=contents.filter(function(c){return c.contentType===t;});

    var wd=items.filter(function(ci){return (ci.logs||[]).some(function(l){return l.metrics&&l.metrics[c.primaryKPI];});});
    var avg=wd.length?Math.round(wd.reduce(function(s,ci){var vals=(ci.logs||[]).map(function(l){return parseInt((l.metrics&&l.metrics[c.primaryKPI])||0);}).filter(Boolean);return s+(vals.length?Math.max.apply(null,vals):0);},0)/wd.length):null;
    var hits=c.primaryKPI==="views"?items.filter(function(ci){return (ci.logs||[]).some(function(l){return parseInt((l.metrics&&l.metrics.views)||0)>=20000;});}).length:null;
    return {type:t,count:items.length,avgKPI:avg,hits:hits,cfg:c};
  });

    setLoading(true);

        "Account:"+profile.handle+" Niche:"+profile.niche+" Followers:"+profile.followers+" Goal:"+(profile.goal||"")+" Content:"+typeStats.map(function(t){return t.count+" "+t.type+"s avg "+t.cfg.kpiLabel+" "+(t.avgKPI||"N/A")+(t.hits!=null?" "+t.hits+" hit 20k":"");}).join(";")+" Tips:"+allTips.slice(0,30).join(";")+"\nReturn JSON:{\"overall_grade\":\"A+|A|B|C|D\",\"grade_note\":\"...\",\"growth_velocity\":\"Accelerating|Steady|Slowing|Stalled\",\"velocity_note\":\"...\",\"content_type_breakdown\":[{\"type\":\"...\",\"count\":0,\"avg_kpi\":\"...\",\"kpi_label\":\"...\",\"verdict\":\"Strong|OK|Weak|No data\",\"strength\":\"...\",\"advice\":\"...\"}],\"tip_effectiveness\":[{\"category\":\"...\",\"estimated_impact\":\"...\",\"evidence\":\"...\",\"verdict\":\"Do More|Modify|Stop\"}],\"what_worked\":[{\"action\":\"...\",\"metric_proof\":\"...\"}],\"what_didnt_work\":[{\"action\":\"...\",\"why\":\"...\",\"pivot\":\"...\"}],\"follower_growth_analysis\":\"...\",\"reach_trend\":\"...\",\"top_3_wins\":[\"...\",\"...\",\"...\"],\"top_3_gaps\":[\"...\",\"...\",\"...\"],\"content_mix_recommendation\":\"...\",\"next_30_days\":[\"...\",\"...\",\"...\",\"...\"],\"projected_growth\":\"...\"}"
      );

  }

  var gc={"A+":GREEN,"A":"#4CAF50","B":YELLOW,"C":"#FF9800","D":RED};
  var vc={"Accelerating":GREEN,"Steady":"#4CAF50","Slowing":YELLOW,"Stalled":RED};
  var vdc={"Strong":GREEN,"OK":YELLOW,"Weak":RED,"No data":T3};

  return(
    <div style={{padding:"20px 0"}}>
      <h2 style={{color:T1,margin:"0 0 4px",fontSize:20,fontWeight:800}}>MI Dashboard</h2>
      <p style={{color:T2,fontSize:14,margin:"0 0 24px"}}>{account.handle} - Marketing Intelligence</p>

        {[{label:"Content",val:contents.length,col:"#C4A7FF"},{label:"Check-ins",val:allLogs.length,col:BLUE},{label:"Follows",val:totalFollows||"—",col:totalFollows?GREEN:T3}].map(function(s,i){
          return(<div key={i} style={{background:SURFACE,border:"1px solid "+EDGE,borderRadius:14,padding:16,textAlign:"center"}}><div style={{color:s.col,fontWeight:800,fontSize:22,lineHeight:1}}>{s.val}</div><div style={{color:T3,fontSize:11,margin:"5px 0 3px",textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}}>{s.label}</div></div>);
        })}

      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
        {typeStats.map(function(ts,i){
          return(<div key={i} style={{background:SURFACE,border:"1px solid "+ts.cfg.color+"35",borderRadius:14,padding:16,textAlign:"center"}}><div style={{fontSize:20,marginBottom:6}}>{ts.cfg.icon}</div><div style={{color:ts.cfg.color,fontWeight:800,fontSize:20,lineHeight:1}}>{ts.avgKPI!=null?ts.avgKPI.toLocaleString():"—"}</div><div style={{color:T3,fontSize:11,margin:"4px 0 2px",fontWeight:600}}>Avg {ts.cfg.kpiLabel}</div><div style={{color:T3,fontSize:11}}>{ts.count} {ts.type}{ts.count!==1?"s":""}</div>{ts.hits!=null&&<div style={{color:ts.hits>0?GREEN:T3,fontSize:11,fontWeight:700,marginTop:4}}>{ts.hits} hit 20k</div>}</div>);
        })}
      </div>
      {!miData&&!loading&&(
        <button onClick={generateMI} disabled={contents.length===0} style={{width:"100%",background:contents.length?"linear-gradient(135deg,"+BLUE+","+PURPLE+","+PINK+")":LIFT,border:"1px solid "+(contents.length?PURPLE:EDGE),borderRadius:12,padding:18,color:contents.length?T1:T3,fontWeight:800,fontSize:16,cursor:contents.length?"pointer":"not-allowed"}}>
          {contents.length===0?"Log content first":"Generate Full MI Report"}
        </button>
      )}
      {loading&&<Spinner msg={msg}/>}
      {miData&&!loading&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            <div style={{background:(gc[miData.overall_grade]||RED)+"14",border:"1px solid "+(gc[miData.overall_grade]||RED)+"40",borderRadius:14,padding:22,textAlign:"center"}}>
              <div style={{color:gc[miData.overall_grade]||RED,fontWeight:900,fontSize:50,lineHeight:1}}>{miData.overall_grade}</div>
              <div style={{color:T3,fontSize:12,margin:"8px 0 5px",textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>Overall Grade</div>
              <div style={{color:T2,fontSize:13,lineHeight:1.5}}>{miData.grade_note}</div>
            </div>
            <div style={{background:(vc[miData.growth_velocity]||T3)+"14",border:"1px solid "+(vc[miData.growth_velocity]||T3)+"40",borderRadius:14,padding:22,textAlign:"center"}}>
              <div style={{color:vc[miData.growth_velocity]||T3,fontWeight:800,fontSize:20,marginBottom:6}}>{miData.growth_velocity}</div>
              <div style={{color:T3,fontSize:12,margin:"0 0 6px",textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>Growth Velocity</div>
              <div style={{color:T2,fontSize:13,lineHeight:1.5}}>{miData.velocity_note}</div>
            </div>
          </div>
          {(miData.content_type_breakdown||[]).length>0&&(
            <Block icon="📊" label="Performance by Content Type" color={T3}>
              {miData.content_type_breakdown.map(function(ct,i){
                var tc=CONTENT_TYPES[ct.type]||CONTENT_TYPES.Reel;
                return(
                  <div key={i} style={{padding:"14px 0",borderBottom:i<miData.content_type_breakdown.length-1?"1px solid "+EDGE:"none"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}}>
                      <span style={{fontSize:18}}>{tc.icon}</span>
                      <span style={{color:tc.color,fontWeight:700,fontSize:15}}>{ct.type}</span>
                      <span style={{color:vdc[ct.verdict]||T3,fontWeight:700,fontSize:14}}>{ct.verdict}</span>
                      <span style={{color:T3,fontSize:13}}>{ct.count} pieces - avg {ct.kpi_label}: {ct.avg_kpi}</span>
                    </div>
                    <p style={{color:T2,fontSize:13,margin:"0 0 4px"}}>{ct.strength}</p>
                    <p style={{color:tc.color,fontSize:13,margin:0,fontWeight:600}}>&#x2192; {ct.advice}</p>
                  </div>
                );
              })}
            </Block>
          )}
          {miData.content_mix_recommendation&&(
            <div style={{background:PURPLE+"14",border:"1px solid "+PURPLE+"35",borderRadius:14,padding:18,marginBottom:14}}>
              <p style={{color:"#C4A7FF",fontWeight:700,fontSize:11,margin:"0 0 8px",textTransform:"uppercase",letterSpacing:1.2}}>Recommended Content Mix</p>
              <p style={{color:T2,fontSize:14,margin:0,lineHeight:1.7}}>{miData.content_mix_recommendation}</p>
            </div>
          )}
          {(miData.tip_effectiveness||[]).length>0&&(
            <Block icon="🎯" label="Tip Effectiveness" color="#C4A7FF">
              {miData.tip_effectiveness.map(function(t,i){
                return(
                  <div key={i} style={{borderBottom:i<miData.tip_effectiveness.length-1?"1px solid "+EDGE:"none",padding:"12px 0"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                      <span style={{color:T1,fontWeight:600,fontSize:14}}>{t.category}</span>
                      <span style={{background:t.verdict==="Do More"?GREEN+"20":t.verdict==="Stop"?RED+"20":YELLOW+"20",color:t.verdict==="Do More"?GREEN:t.verdict==="Stop"?RED:YELLOW,borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{t.verdict}</span>
                    </div>
                    <p style={{color:T2,fontSize:13,margin:"0 0 4px"}}>Impact: {t.estimated_impact}</p>
                    <p style={{color:T3,fontSize:12,margin:0}}>Evidence: {t.evidence}</p>
                  </div>
                );
              })}
            </Block>
          )}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            <Block icon="✅" label="What Worked" color={GREEN} style={{marginBottom:0}}>
              {(miData.what_worked||[]).map(function(w,i){return(<div key={i} style={{marginBottom:12}}><p style={{color:T1,fontSize:13,fontWeight:600,margin:"0 0 4px"}}>{w.action}</p><p style={{color:T3,fontSize:12,margin:0}}>{w.metric_proof}</p></div>);})}
            </Block>
            <Block icon="❌" label="What Didn't" color={RED} style={{marginBottom:0}}>
              {(miData.what_didnt_work||[]).map(function(w,i){return(<div key={i} style={{marginBottom:12}}><p style={{color:T1,fontSize:13,fontWeight:600,margin:"0 0 3px"}}>{w.action}</p><p style={{color:T3,fontSize:12,margin:"0 0 3px"}}>{w.why}</p><p style={{color:RED,fontSize:12,margin:0}}>&#x2192; {w.pivot}</p></div>);})}
            </Block>
          </div>
          <Block icon="➕" label="Follower Growth + Reach" color={GREEN}>
            <Lbl color={GREEN}>Follower analysis</Lbl>
            <p style={{color:T2,fontSize:14,margin:"0 0 16px",lineHeight:1.7}}>{miData.follower_growth_analysis}</p>
            <Lbl color={BLUE}>Reach trend</Lbl>
            <p style={{color:T2,fontSize:14,margin:0,lineHeight:1.7}}>{miData.reach_trend}</p>
          </Block>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            <Block icon="🏆" label="Top 3 Wins" color={GREEN} style={{marginBottom:0}}>{(miData.top_3_wins||[]).map(function(w,i){return <p key={i} style={{color:T2,fontSize:13,margin:"0 0 7px"}}>{i+1}. {w}</p>;})}</Block>
            <Block icon="⚠️" label="Top 3 Gaps" color={YELLOW} style={{marginBottom:0}}>{(miData.top_3_gaps||[]).map(function(g,i){return <p key={i} style={{color:T2,fontSize:13,margin:"0 0 7px"}}>{i+1}. {g}</p>;})}</Block>
          </div>
          <div style={{background:BLUE+"14",border:"1px solid "+BLUE+"35",borderRadius:14,padding:20,marginBottom:14}}>
            <p style={{color:BLUE,fontWeight:700,fontSize:12,margin:"0 0 14px",textTransform:"uppercase",letterSpacing:1.2}}>Next 30 Days</p>
            {(miData.next_30_days||[]).map(function(a,i){return(<div key={i} style={{display:"flex",gap:12,padding:"9px 0",borderBottom:i<miData.next_30_days.length-1?"1px solid "+BLUE+"20":"none",alignItems:"flex-start"}}><span style={{color:BLUE,fontWeight:800,minWidth:22}}>{i+1}.</span><span style={{color:T2,fontSize:14,lineHeight:1.5}}>{a}</span></div>);})}
          </div>
          <div style={{background:GREEN+"10",border:"1px solid "+GREEN+"30",borderRadius:12,padding:18}}>
            <p style={{color:GREEN,fontWeight:700,fontSize:12,margin:"0 0 8px",textTransform:"uppercase",letterSpacing:1.2}}>Projected Growth</p>
            <p style={{color:T2,fontSize:14,margin:0,lineHeight:1.7}}>{miData.projected_growth}</p>
          </div>
          <button onClick={function(){setMiData(null);}} style={{width:"100%",background:LIFT,border:"1px solid "+EDGE,borderRadius:12,padding:13,color:T2,cursor:"pointer",marginTop:14,fontSize:14,fontWeight:600}}>Regenerate MI Report</button>
        </div>
      )}
    </div>
  );
}

function AccountDashboard({account,onNav}){
  var now=Date.now();var dueCount=0;var contents=account.contents||[];
  contents.forEach(function(c){
    var hrs=(now-new Date(c.postedAt).getTime())/3600000;
    var cfg=CONTENT_TYPES[c.contentType]||CONTENT_TYPES.Reel;
    cfg.schedules.forEach(function(s){if(hrs>=s.minH&&hrs<=s.maxH&&!(c.logs||[]).some(function(l){return l.checkInId===s.id;}))dueCount++;});
  });
  var allLogs=contents.flatMap(function(c){return c.logs||[];});
  var reelViews=contents.filter(function(c){return c.contentType==="Reel";}).map(function(c){var v=(c.logs||[]).map(function(l){return parseInt((l.metrics&&l.metrics.views)||0);}).filter(Boolean);return v.length?Math.max.apply(null,v):0;}).filter(Boolean);
  var avgRV=reelViews.length?Math.round(reelViews.reduce(function(a,b){return a+b;},0)/reelViews.length):0;
  var totalFollows=allLogs.reduce(function(s,l){return s+parseInt((l.metrics&&l.metrics.new_follows)||0);},0);
  var color=account.color||PINK;
  return(
    <div style={{padding:"20px 0"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <Avatar account={account} size={48}/>
        <div>
          <h2 style={{color:T1,margin:"0 0 3px",fontSize:20,fontWeight:800}}>{account.handle}</h2>
          <p style={{color:T2,fontSize:14,margin:0}}>{account.niche} - <span style={{color:T3}}>{account.goal}</span></p>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
        {[
          {label:"Reel Avg Views",val:avgRV?avgRV.toLocaleString():"—",col:avgRV>=20000?GREEN:avgRV>0?YELLOW:T3,sub:avgRV>=20000?"On target":"target: 20k"},
          {label:"Check-ins Due",val:dueCount||"✓",col:dueCount?YELLOW:T3,sub:dueCount?"action needed":"all done"},
          {label:"Follows Gained",val:totalFollows||"—",col:totalFollows?GREEN:T3,sub:"from content"},
        ].map(function(s,i){
          return(<div key={i} style={{background:SURFACE,border:"1px solid "+EDGE,borderRadius:14,padding:16,textAlign:"center"}}><div style={{color:s.col,fontWeight:800,fontSize:22,lineHeight:1}}>{s.val}</div><div style={{color:T3,fontSize:11,margin:"5px 0 3px",textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}}>{s.label}</div><div style={{color:s.col,fontSize:11}}>{s.sub}</div></div>);
        })}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:20}}>
        {ALL_TYPES.map(function(t){
          var c=CONTENT_TYPES[t];var cnt=contents.filter(function(x){return x.contentType===t;}).length;
          return(<div key={t} style={{background:SURFACE,border:"1px solid "+c.color+"30",borderRadius:12,padding:"12px 8px",textAlign:"center"}}><div style={{fontSize:20,marginBottom:5}}>{c.icon}</div><div style={{color:cnt?c.color:T3,fontWeight:800,fontSize:18}}>{cnt}</div><div style={{color:T3,fontSize:12,marginTop:2}}>{t}s</div></div>);
        })}
      </div>
      {dueCount>0&&(
        <div onClick={function(){onNav("checkins");}} style={{background:color+"10",border:"1px solid "+color+"50",borderRadius:14,padding:18,marginBottom:12,cursor:"pointer",display:"flex",gap:14,alignItems:"center"}}>
          <span style={{fontSize:28}}>⚡</span>
          <div style={{flex:1}}>
            <div style={{color:color,fontWeight:700,fontSize:15,marginBottom:3}}>{dueCount} check-in{dueCount>1?"s":""} due now</div>
            <div style={{color:T2,fontSize:13}}>Log metrics and get action plan</div>
          </div>
          <span style={{color:color,fontSize:22}}>›</span>
        </div>
      )}
      {[
        {key:"studio",icon:"🎬",title:"Create Content",sub:"Reels, Posts, Carousels - type-specific briefs"},
        {key:"tracker",icon:"📊",title:"Content Tracker",sub:"Log and track all published content"},
        {key:"mi",icon:"🧠",title:"MI Dashboard",sub:"Tip ROI, Growth analysis, What is working"},
      ].map(function(item){
        return(
          <div key={item.key} onClick={function(){onNav(item.key);}} style={{background:SURFACE,border:"1px solid "+EDGE,borderRadius:14,padding:18,marginBottom:10,cursor:"pointer",display:"flex",gap:14,alignItems:"center"}}>
            <span style={{fontSize:24}}>{item.icon}</span>
            <div style={{flex:1}}>
              <div style={{color:T1,fontWeight:700,fontSize:15,marginBottom:3}}>{item.title}</div>
              <div style={{color:T2,fontSize:13}}>{item.sub}</div>
            </div>
            <span style={{color:T3,fontSize:20}}>›</span>
          </div>
        );
      })}
      <div style={{background:YELLOW+"08",border:"1px solid "+YELLOW+"20",borderRadius:14,padding:18,marginTop:18}}>
        <p style={{color:YELLOW,fontWeight:700,fontSize:12,margin:"0 0 12px",textTransform:"uppercase",letterSpacing:1}}>What I need from you</p>
        {["Log every Reel, Post, Carousel right after publishing","Enter Instagram Insights numbers at each check-in (60 sec)","Reply to every comment within 30 min of posting","Share reference content in Studio before generating briefs"].map(function(n,i){return <p key={i} style={{color:T2,fontSize:13,margin:"0 0 6px"}}>- {n}</p>;})}
      </div>
    </div>
  );
}

function App(){
  const [accounts,setAccounts]=useState([]);
  const [activeId,setActiveId]=useState(null);
  const [tab,setTab]=useState("dashboard");
  const [showManager,setShowManager]=useState(false);
  const [showOverview,setShowOverview]=useState(false);

  useEffect(function(){
    var d=loadAll();
    if(d&&d.accounts&&d.accounts.length>0){setAccounts(d.accounts);setActiveId(d.activeId||d.accounts[0].id);}
  },[]);

  useEffect(function(){
    if(accounts.length>0) saveAll({accounts:accounts,activeId:activeId});
  },[accounts,activeId]);

  var updateAccount=useCallback(function(updated){
    setAccounts(function(prev){return prev.map(function(a){return a.id===updated.id?updated:a;});});
  },[]);

  var activeAccount=accounts.find(function(a){return a.id===activeId;})||accounts[0];

  if(accounts.length===0){
    return(
      <div style={{minHeight:"100vh",background:BG,display:"flex",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'Inter',-apple-system,sans-serif"}}>
        <div style={{width:"100%",maxWidth:480}}>
          <div style={{textAlign:"center",marginBottom:44}}>
            <div style={{display:"inline-flex",gap:5,marginBottom:16}}>
              {[PINK,PURPLE,BLUE,"#5851DB","#C13584"].map(function(c,i){return <div key={i} style={{width:10,height:10,borderRadius:"50%",background:c}}/>;})}</div>
            <h1 style={{color:T1,fontSize:26,fontWeight:800,margin:0,letterSpacing:-0.8}}>Social Media Manager</h1>
            <p style={{color:T3,fontSize:14,marginTop:8}}>Manage 5+ Instagram accounts from one place</p>
          </div>
          <AccountManager accounts={[]} activeId={null}
            onSave={function(accs){setAccounts(accs);setActiveId(accs[accs.length-1].id);}}
            onClose={function(){}} onDelete={function(){}} onSwitch={function(){}}/>
        </div>
      </div>
    );
  }

  if(!activeAccount) return null;

  var now=Date.now();var dueCount=0;
  (activeAccount.contents||[]).forEach(function(c){
    var hrs=(now-new Date(c.postedAt).getTime())/3600000;
    var cfg=CONTENT_TYPES[c.contentType]||CONTENT_TYPES.Reel;
    cfg.schedules.forEach(function(s){if(hrs>=s.minH&&hrs<=s.maxH&&!(c.logs||[]).some(function(l){return l.checkInId===s.id;}))dueCount++;});
  });

  var totalDueAll=accounts.reduce(function(s,a){
    var d=0;
    (a.contents||[]).forEach(function(c){
      var hrs=(now-new Date(c.postedAt).getTime())/3600000;
      var cfg=CONTENT_TYPES[c.contentType]||CONTENT_TYPES.Reel;
      cfg.schedules.forEach(function(s){if(hrs>=s.minH&&hrs<=s.maxH&&!(c.logs||[]).some(function(l){return l.checkInId===s.id;}))d++;});
    });
    return s+d;
  },0);

  var navItems=[
    {key:"dashboard",icon:"🏠",label:"Home"},
    {key:"checkins",icon:"⚡",label:"Check-ins",badge:dueCount},
    {key:"studio",icon:"🎬",label:"Studio"},
    {key:"tracker",icon:"📊",label:"Tracker"},
    {key:"mi",icon:"🧠",label:"MI"},
  ];

  function renderTab(){
    if(tab==="dashboard") return <AccountDashboard account={activeAccount} onNav={setTab}/>;
    if(tab==="checkins") return <CheckinsTab account={activeAccount} updateAccount={updateAccount} profile={activeAccount}/>;
    if(tab==="studio") return <ContentStudio profile={activeAccount}/>;
    if(tab==="tracker") return <TrackerTab account={activeAccount} updateAccount={updateAccount}/>;
    if(tab==="mi") return <MIDashboard account={activeAccount} profile={activeAccount}/>;
    return <AccountDashboard account={activeAccount} onNav={setTab}/>;
  }

  return(
    <div style={{background:BG,minHeight:"100vh",fontFamily:"'Inter',-apple-system,sans-serif",color:T1}}>
      <div style={{background:BG,borderBottom:"1px solid "+EDGE,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",gap:3}}>{[PINK,PURPLE,BLUE].map(function(c,i){return <div key={i} style={{width:7,height:7,borderRadius:"50%",background:c}}/>;})}</div>
          <button onClick={function(){setShowOverview(true);}} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:6}}>
            <span style={{color:T1,fontWeight:800,fontSize:14,letterSpacing:-0.3}}>SMM</span>
            {totalDueAll>0&&<span style={{background:YELLOW+"25",color:YELLOW,borderRadius:20,padding:"1px 8px",fontSize:10,fontWeight:700}}>{totalDueAll}</span>}
          </button>
        </div>
        <AccountSwitcher accounts={accounts} activeId={activeId}
          onSwitch={function(id){setActiveId(id);setTab("dashboard");}}
          onManage={function(){setShowManager(true);}}/>
      </div>
      <div style={{maxWidth:680,margin:"0 auto",padding:"0 18px 90px"}}>{renderTab()}</div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:BG,borderTop:"1px solid "+EDGE,display:"flex",padding:"10px 0 18px"}}>
        {navItems.map(function(item){
          return(
            <button key={item.key} onClick={function(){setTab(item.key);}} style={{flex:1,background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"4px 0",position:"relative"}}>
              <span style={{fontSize:21}}>{item.icon}</span>
              {item.badge>0&&<div style={{position:"absolute",top:0,right:"calc(50% - 19px)",background:activeAccount.color||PINK,color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{item.badge}</div>}
              <span style={{fontSize:10,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",color:tab===item.key?(activeAccount.color||PINK):T3}}>{item.label}</span>
              {tab===item.key&&<div style={{width:16,height:2,background:activeAccount.color||PINK,borderRadius:2}}/>}
            </button>
          );
        })}
      </div>
      {showManager&&(
        <AccountManager accounts={accounts} activeId={activeId}
          onSave={function(accs){setAccounts(accs);if(!accs.find(function(a){return a.id===activeId;})&&accs.length>0)setActiveId(accs[0].id);}}
          onClose={function(){setShowManager(false);}}
          onDelete={function(id){var remaining=accounts.filter(function(a){return a.id!==id;});setAccounts(remaining);if(activeId===id&&remaining.length>0)setActiveId(remaining[0].id);}}
          onSwitch={function(id){setActiveId(id);setTab("dashboard");setShowManager(false);}}/>
      )}
      {showOverview&&(
        <div style={{position:"fixed",inset:0,background:"rgba(7,7,15,.97)",zIndex:150,overflowY:"auto"}}>
          <div style={{maxWidth:680,margin:"0 auto",padding:"16px 18px 40px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{display:"flex",gap:3}}>{[PINK,PURPLE,BLUE].map(function(c,i){return <div key={i} style={{width:7,height:7,borderRadius:"50%",background:c}}/>;})}</div>
              <button onClick={function(){setShowOverview(false);}} style={{background:LIFT,border:"1px solid "+EDGE,borderRadius:10,padding:"8px 16px",color:T2,cursor:"pointer",fontSize:13}}>Close</button>
            </div>
            <CrossAccountOverview accounts={accounts} onSwitch={function(id){setActiveId(id);setTab("dashboard");setShowOverview(false);}}/>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
</html>
